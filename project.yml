name: Joiner
options:
  bundleIdPrefix: com.joinerapp
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

targets:
  Joiner:
    type: application
    platform: macOS
    sources:
      - path: src/Joiner
        excludes:
          - "**/.DS_Store"
    dependencies:
      - sdk: EventKit.framework
      - sdk: UserNotifications.framework
      - sdk: ServiceManagement.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.joinerapp.Joiner
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_FILE: src/Joiner/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_NAME: Joiner
        COMBINE_HIDPI_IMAGES: YES
        CODE_SIGN_ENTITLEMENTS: src/Joiner/Resources/Joiner.entitlements
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
          ENABLE_HARDENED_RUNTIME: YES

  JoinerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: tests/JoinerTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: Joiner
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Joiner.app/Contents/MacOS/Joiner"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Joiner:
    build:
      targets:
        Joiner: all
        JoinerTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - JoinerTests
    archive:
      config: Release
